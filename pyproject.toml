[project]
name = "mnemo"
version = "0.0.5"
description = "Local, on-demand memory for AI coding agents (MCP)."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "mcp>=1.2.0",
    "typer>=0.12.0",
]

[project.optional-dependencies]
embed = ["fastembed>=0.4.0"]   # local ONNX embeddings (heavy)
store = ["lancedb>=0.13.0"]    # Phase 1 scaling backend
dev = ["pytest>=8.0"]

[project.scripts]
mnemo = "mnemo.adapters.cli.app:main"
mnemo-mcp = "mnemo.adapters.mcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mnemo"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
addopts = "-m 'not heavy'"
markers = [
    "heavy: requires heavy/networked backends (fastembed, lancedb)",
]
